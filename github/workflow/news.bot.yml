name: Post news to Telegram

on:
  schedule:
    # Runs every 15 minutes. GitHub may delay this by a few minutes under load.
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

permissions:
  contents: write # needed to commit the updated seen.json ledger back to the repo

concurrency:
  group: news-bot
  cancel-in-progress: false # never cancel a run that might be mid-post

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run news bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ vars.TELEGRAM_CHANNEL_ID }}
        run: node bot.mjs

      - name: Persist seen-articles ledger
        run: |
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git config user.name "news-bot"
            git config user.email "news-bot@users.noreply.github.com"
            git add seen.json
            git commit -m "chore: update seen articles ledger [skip ci]"
            git push
          else
            echo "No changes to seen.json"
          fi
